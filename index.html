<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Inscope Business Card — Editor</title>
<style>
:root{--lime:#A1FF08;--ink:#141414}
*{box-sizing:border-box} html,body{margin:0}
body{font-family:'Work Sans','Helvetica Neue',Arial,sans-serif;background:#eceae4;color:#1c1c1c}
.app{display:flex;gap:30px;padding:28px;align-items:flex-start;flex-wrap:wrap}
.ui{width:320px;background:#fff;border:1px solid #e2e0d8;border-radius:14px;padding:20px;position:sticky;top:22px}
.ui h1{font-size:17px;margin:0 0 2px}.ui .s{font-size:12px;color:#8a8880;margin-bottom:16px}
.field{margin-bottom:11px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#9a988f;margin-bottom:5px}
.field input{width:100%;font-family:inherit;font-size:13.5px;padding:8px 10px;border:1px solid #dcdad2;border-radius:8px;background:#faf9f6;color:#1c1c1c}
.field input:focus{outline:none;border-color:var(--lime);background:#fff}
.btns{margin-top:16px;display:grid;gap:9px}
.btns button{font-family:inherit;font-weight:600;font-size:12.5px;padding:11px 12px;border-radius:9px;border:1px solid transparent;cursor:pointer;background:var(--ink);color:#fff}
.hint{font-size:11px;color:#a3a199;margin-top:12px;line-height:1.5}
.preview{display:flex;flex-direction:column;gap:14px}
.tgbar{display:flex;gap:8px;align-items:center}.tgbar .lbl{font-size:11px;font-weight:700;letter-spacing:.12em;color:#9a988f;text-transform:uppercase;margin-right:4px}
.seg{display:inline-flex;border:1px solid #d4d2ca;border-radius:8px;overflow:hidden}
.seg button{border:0;border-radius:0;background:#fff;color:#555;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.seg button.on{background:var(--ink);color:#fff}
.cards{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start}
.stage{text-align:center}.stage .tag{font-size:11px;font-weight:700;letter-spacing:.25em;color:#9a988f;margin-bottom:10px}
.view{overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.13);background:#fff}
.card{display:block;width:305px;height:455px}
.view{width:275px;height:425px}
.view .card{margin:-15px 0 0 -15px}
.bleedview .view{width:305px;height:455px}
.bleedview .view .card{margin:0}
.crop,.trimguide{display:none}
.bleedview .crop{display:block}.bleedview .trimguide{display:block}
@media print{
 html,body{background:#fff}
 .ui,.tag,.tgbar{display:none!important}
 .app{display:block;padding:0}.preview{display:block}.cards{display:block}.stage{display:block}
 .view{overflow:hidden;box-shadow:none;background:transparent;page-break-after:always}
 .trimguide{display:none!important}
 body:not(.bleed) .view{width:55mm;height:85mm}
 body:not(.bleed) .card{width:61mm;height:91mm;margin-left:-3mm;margin-top:-3mm}
 body.bleed .view{width:61mm;height:91mm}
 body.bleed .card{width:61mm;height:91mm;margin:0}
 body.bleed .crop{display:block}
 .vb{page-break-after:auto}
}
</style></head><body>
